version: "3.9"

services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: doc-request-postgres
    environment:
      POSTGRES_DB: doc_request_db
      POSTGRES_USER: docrequest
      POSTGRES_PASSWORD: docrequest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docrequest -d doc_request_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MongoDB =====
  mongodb:
    image: mongo:7.0
    container_name: doc-request-mongodb
    environment:
      MONGO_INITDB_DATABASE: doc_request_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7.2-alpine
    container_name: doc-request-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MinIO =====
  minio:
    image: minio/minio:latest
    container_name: doc-request-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Keycloak =====
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: doc-request-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "8080:8080"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:
