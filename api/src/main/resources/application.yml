server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: doc-request-service

  # ===== PostgreSQL (JPA) =====
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/doc_request_db}
    username: ${DB_USERNAME:docrequest}
    password: ${DB_PASSWORD:docrequest}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===== MongoDB =====
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/doc_request_db}
      auto-index-creation: true

    # ===== Redis =====
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ===== Spring Security OAuth2 Resource Server =====
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/doc-request}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/doc-request/protocol/openid-connect/certs}

  # ===== Cache =====
  cache:
    type: redis
    redis:
      time-to-live: 1800000 # 30 minutes default

# ===== MinIO =====
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-prefix: ${MINIO_BUCKET_PREFIX:docrequest}

# ===== Application Custom Properties =====
app:
  security:
    tenant-claim: ${APP_TENANT_CLAIM:tenantId}
    roles-claim: ${APP_ROLES_CLAIM:roles}
  cache:
    domain-table-ttl-minutes: ${APP_CACHE_DOMAIN_TABLE_TTL:30}
    metadata-ttl-minutes: ${APP_CACHE_METADATA_TTL:15}
    metadata-version-ttl-minutes: ${APP_CACHE_METADATA_VERSION_TTL:60}
  file:
    max-size-mb: ${APP_FILE_MAX_SIZE_MB:10}
  validation:
    external-timeout-seconds: ${APP_VALIDATION_EXTERNAL_TIMEOUT:10}

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ===== OpenAPI / Swagger =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Doc Request Service API
    description: Microservice for managing document request templates and submissions
    version: 1.0.0

# ===== Logging =====
logging:
  level:
    br.com.docrequest: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{partId}] %logger{36} - %msg%n"
